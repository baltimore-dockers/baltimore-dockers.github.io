---
title: News
---

<div class="hero">
  <div class="team-name hero-content">Baltimore Dockers</div>
  <div class="tag-line hero-content">Welcome to the Dock Show</div>
</div>

<div class="news-container">
    {% for post in site.posts %}
    {% assign bg_url = post['grid photo'] | slice: 9, post['grid photo'].size %}
      <div 
        class="news-item" 
      >
        <h1>{{ post.title }}</h1>
        <a href="{{ post.url }}">
            <span class="link-spanner"></span>
        </a>
      </div>
    {% endfor %}
</div>
